<article class="case-content">
<h2>项目背景</h2><p>美皮护推出儿童疤痕护理新产品线，需要在全国多个城市做线下路演来教育市场、触达目标消费者。外企对路演的品质标准很高，但预算分到每个城市并不充裕。</p>
<div class="role-box"><h3>我的角色</h3><p>我设计了可复用的标准化路演方案——主舞台、互动区、产品体验区的模块化设计让不同城市可以快速搭建和拆除，大幅降低了单城成本。在路线规划上，优先选了新生儿出生率高的二线城市和儿童医院集中的区域，确保资源投在了目标客群密度最高的地方。</p></div>
