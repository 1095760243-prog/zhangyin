<h1>太白云境</h1><p class="case-meta">地产营销 / 文旅地产整合推广</p></div></section>
<article class="case-content">
<h2>项目背景</h2><p>太白云境是位于秦岭北麓的文旅地产项目，需要做从品牌定位到销售物料的全套推广方案。文旅地产跟城市住宅的推广逻辑完全不同——卖的不是地段，是生活方式和稀缺资源。</p>
<div class="role-box"><h3>我的角色</h3><p>我主导了项目的品牌定位和推广策略。通过调研发现目标客群对秦岭和太白山有很强的情感认同，于是把推广的核心锚点放在了山居生活方式上，而不是传统的户型图和价格表。宣传片拍了四季的山景和日常，销售物料也用了大量实景摄影而非效果图。</p></div>
