<article class="case-content">
<h2>项目背景</h2><p>清凉云集是商业综合体项目，需要招商推广和消费者端品牌传播两套策略并行。商业地产的痛点是：招商需要专业感，C端传播需要烟火气，如何在同一个品牌体系下兼容是核心挑战。</p>
<div class="role-box"><h3>我的角色</h3><p>我的策略是做两套视觉语言：面向招商端的物料侧重数据和区位优势，简洁专业；面向消费者的内容则充满生活气息，美食、亲子、社交等场景轮番上阵。核心的VI体系统一不变，但内容层面的表达方式因受众而异。</p></div>
