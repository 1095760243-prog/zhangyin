<article class="case-content">
<h2>项目背景</h2><p>悦达玖玺台是高端改善型住宅项目，目标客群是对生活品质有高要求的城市中产以上人群。需要一套匹配产品调性的品牌包装和推广方案。</p>
<div class="role-box"><h3>我的角色</h3><p>我的主要工作是品牌的视觉定位和推广策略制定。高端住宅的推广不能喊、不能急，越冷静越有力量。我建议客户减少传统广告投放，把预算转移到样板间体验和圈层活动上。做的物料注重材质和细节——光是楼书就打了十几版样，封面纸张反复对比。</p></div>
