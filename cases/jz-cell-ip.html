<article class="case-content">
<h2>项目背景</h2><p>九洲集团是生命健康企业，需要一套能让内部有凝聚力、对外有辨识度的IP形象体系。之前他们用过一些零散的视觉元素，但没有系统化。</p>
<div class="role-box"><h3>我的角色</h3><p>我基于对生物医药品牌的理解，提出了细胞家族概念——把不同功能的细胞拟人化，赋予性格和故事。这比做一个笼统的吉祥物更有延展性，每个业务板块都能找到自己的IP角色。我带着设计师跟九洲各业务线的负责人分别沟通，确保每个IP角色跟业务特点贴合。</p></div>
